<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            color: black;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        #loader {
            display: none;
            margin-top: 10px;
        }
    </style>

    <script>
        function showLoader() {
            document.getElementById("loader").style.display = "block";
        }
    </script>

</head>
<body>

    <h1>📰 Fake News Detector</h1>

    <div class="card">
        <form method="POST" onsubmit="showLoader()">
            <textarea name="news" rows="8" placeholder="Paste your news here..."></textarea>
            <br>
            <button type="submit">Check News</button>
        </form>

        <div id="loader">⏳ Checking...</div>

        {% if prediction %}
            <h2>{{ prediction }}</h2>
        {% endif %}
    </div>

</body>
</html>
